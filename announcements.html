<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Duyurular</title>

  <script src="components/load-navbar.js"></script>

  <style>
    body{
      margin:0;
      background:#050816;
      color:white;
      font-family:Inter,sans-serif;
    }

    .container{
      max-width:1100px;
      margin:auto;
      padding:120px 20px 60px;
    }

    .hero{
      background:
        linear-gradient(
          135deg,
          rgba(37,99,235,.25),
          rgba(15,23,42,.96)
        );

      border:1px solid rgba(125,211,252,.25);

      border-radius:28px;

      padding:34px;
    }

    h1{
      font-size:clamp(2.4rem,7vw,5rem);
      margin:0 0 12px;
    }

    .announce-grid{
      display:grid;
      grid-template-columns:
      repeat(auto-fit,minmax(260px,1fr));

      gap:22px;

      margin-top:32px;
    }

    .announce-card{
      background:
        linear-gradient(
          135deg,
          rgba(56,189,248,.18),
          rgba(15,23,42,.96)
        );

      border-radius:24px;

      padding:24px;

      border:1px solid rgba(255,255,255,.12);

      transition:.25s ease;
    }

    .announce-card:hover{
      transform:translateY(-5px);

      border-color:
      rgba(125,211,252,.55);
    }
  </style>
</head>

<body>

<div id="navbar-container"></div>

<main class="container">

  <section class="hero">
    <h1>Duyurular</h1>

    <p>
      Sistem güncellemeleri, yeni teori serileri,
      Rabûn modeli gelişmeleri ve proje duyuruları.
    </p>
  </section>

  <section class="announce-grid">

    <div class="announce-card">
      <h2>Yeni Hebûn Yapısı</h2>

      <p>
        Hebûn alt bölümleri artık kendi sayfasına taşındı.
      </p>
    </div>

    <div class="announce-card">
      <h2>Mobil UI Güncellemesi</h2>

      <p>
        Android görünümü yeniden optimize edildi.
      </p>
    </div>

    <div class="announce-card">
      <h2>Rabûn Sistemi</h2>

      <p>
        Rabûn yönetim modeli yeni yapıya geçiriliyor.
      </p>
    </div>

  </section>

</main>

</body>
</html>
