<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zanistarast AI & Speech</title>

<style>
.session-tools{
  margin:18px 0;
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

.session-tools input,
.session-tools select{
  padding:12px 14px;
  border-radius:12px;
  border:1px solid #4ea1ff;
  background:#0b1324;
  color:white;
}

.session-tools button{
  padding:12px 14px;
  border-radius:12px;
  border:0;
  cursor:pointer;
  font-weight:700;
}

body{margin:0;font-family:Inter,Arial;background:#0a0f1c;color:white}
.panel{max-width:900px;margin:60px auto;padding:30px;background:rgba(20,30,40,.9);border-radius:20px}
#languageSelect{font-size:18px;padding:12px 18px;border-radius:10px;background:#111;color:white;border:2px solid #4ea1ff;margin-bottom:20px}
textarea{width:100%;height:140px;border-radius:14px;padding:16px;background:#0b1324;color:white;border:1px solid #333;font-size:18px}
button{padding:12px 18px;border:0;border-radius:12px;margin:10px 8px 0 0;cursor:pointer;font-weight:700}
.start{background:#32d583}.stop{background:#ff8a8a}.send{background:#ffd43b}.read{background:#dff3ff}.clear{background:#ffa94d}
#thinking{display:none;margin-top:18px;padding:18px 24px;border-radius:16px;background:#101d33;border:1px solid #4ea1ff;font-size:20px;font-weight:700}
#thinking.show{display:block}
.dots::after{content:"";animation:dots 1.2s infinite}
@keyframes dots{0%{content:""}33%{content:"."}66%{content:".."}100%{content:"..."}}
#output{margin-top:20px;font-size:18px;line-height:1.6;}

.answer-top{
  margin:22px 0;
  padding:22px;
  background:#0b1324;
  border:1px solid #4ea1ff;
  border-radius:18px;
}

.suggestions{
  margin:16px 0 22px;
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

.suggestions button{
  background:#17243a;
  color:white;
  border:1px solid #4ea1ff;
  border-radius:999px;
  padding:10px 14px;
  font-size:15px;
}

.suggestions button:hover{
  background:#23456f;
}
.chat-box{
  margin:22px 0;
  display:flex;
  flex-direction:column;
  gap:14px;
}

.message{
  padding:16px 18px;
  border-radius:18px;
  line-height:1.6;
  font-size:16px;
  max-width:85%;
}

.user-message{
  align-self:flex-end;
  background:#1d4ed8;
  color:white;
}

.ai-message{
  align-self:flex-start;
  background:#0b1324;
  border:1px solid #4ea1ff;
  color:white;
}

.ai-message h3{
  margin-top:0;
}
.message-meta{
  margin-top:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  font-size:12px;
  opacity:.75;
}

.message-meta button{
  padding:6px 10px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.25);
  background:rgba(255,255,255,.08);
  color:white;
  cursor:pointer;
  font-size:12px;
}

.message-meta button:hover{
  background:rgba(255,255,255,.16);
}
</style>

</head>

<body>
<div class="panel">
  <h1>Zanistarast AI & Speech</h1>

 <select id="languageSelect">
  <option value="tr-TR">Türkçe</option>
  <option value="en-US">English</option>
  <option value="ku-TR">Kurdî</option>
  <option value="ar-SA">العربية</option>
  <option value="fa-IR">فارسی</option>
  <option value="ur-PK">اردو</option>
  <option value="hi-IN">हिन्दी</option>
  <option value="bn-BD">বাংলা</option>
  <option value="pa-IN">ਪੰਜਾਬੀ</option>
  <option value="zh-CN">中文 (简体)</option>
  <option value="zh-TW">中文 (繁體)</option>
  <option value="ja-JP">日本語</option>
  <option value="ko-KR">한국어</option>
  <option value="th-TH">ไทย</option>
  <option value="vi-VN">Tiếng Việt</option>
  <option value="id-ID">Bahasa Indonesia</option>
  <option value="ms-MY">Bahasa Melayu</option>
  <option value="de-DE">Deutsch</option>
  <option value="fr-FR">Français</option>
  <option value="es-ES">Español</option>
  <option value="pt-PT">Português</option>
  <option value="it-IT">Italiano</option>
  <option value="nl-NL">Nederlands</option>
  <option value="sv-SE">Svenska</option>
  <option value="no-NO">Norsk</option>
  <option value="da-DK">Dansk</option>
  <option value="fi-FI">Suomi</option>
  <option value="pl-PL">Polski</option>
  <option value="cs-CZ">Čeština</option>
  <option value="sk-SK">Slovenčina</option>
  <option value="hu-HU">Magyar</option>
  <option value="ro-RO">Română</option>
  <option value="bg-BG">Български</option>
  <option value="el-GR">Ελληνικά</option>
  <option value="ru-RU">Русский</option>
  <option value="uk-UA">Українська</option>
  <option value="he-IL">עברית</option>
  <option value="sw-KE">Swahili</option>
  <option value="am-ET">አማርኛ</option>
  <option value="zu-ZA">Zulu</option>
  <option value="af-ZA">Afrikaans</option>
  <option value="ta-IN">தமிழ்</option>
  <option value="te-IN">తెలుగు</option>
  <option value="ml-IN">മലയാളം</option>
  <option value="kn-IN">ಕನ್ನಡ</option>
  <option value="mr-IN">मराठी</option>
  <option value="gu-IN">ગુજરાતી</option>
</select>
 <div class="session-tools">
  <input id="sessionName" placeholder="Sohbet adı yaz..." />
  <button onclick="newChatSession()">Yeni Sohbet</button>
  <button onclick="saveChatSession()">Sohbeti Kaydet</button>
  <select id="sessionList" onchange="loadSelectedSession()">
    <option value="">Kayıtlı sohbet seç</option>
  </select>
</div>
  
<div id="chatBox" class="chat-box"></div>
<div id="output" class="answer-top"></div>

<div id="suggestions" class="suggestions"></div>

<textarea id="input" placeholder="Bir şey yaz veya konuş..."></textarea>

<div>
  <button class="start" onclick="startListen()"> Başla</button>
  <button class="stop" onclick="stopListen()">■ Durdur</button>
  <button class="send" onclick="ask()">➤ Gönder</button>
  <button class="read" onclick="readAnswer()"> Oku</button>
  <button class="clear" onclick="clearBox()">× Temizle</button>
  <button class="read" onclick="downloadChat()">Geçmişi İndir</button>
  <button class="read" onclick="copyAllChat()">Tüm Sohbeti Kopyala</button>
  <button onclick="deleteSelectedSession()">Seçili Sohbeti Sil</button>
</div>

<div id="thinking">Düşünüyor<span class="dots"></span></div>

<script>
let lastAnswer = "";
// 🔥 Chat hafıza
let chatHistory = [];
let currentSessionName = "varsayilan";

function getAllSessions(){
  return JSON.parse(localStorage.getItem("zanistarast_sessions") || "{}");
}

function saveAllSessions(sessions){
  localStorage.setItem("zanistarast_sessions", JSON.stringify(sessions));
}

function saveChatSession(){
  const nameInput = document.getElementById("sessionName");
  const name = nameInput.value.trim() || currentSessionName || "varsayilan";

  const sessions = getAllSessions();
  sessions[name] = chatHistory;

  saveAllSessions(sessions);
  currentSessionName = name;

  refreshSessionList();
  alert("Sohbet kaydedildi: " + name);
}

function refreshSessionList(){
  const sessionList = document.getElementById("sessionList");
  const sessions = getAllSessions();

  sessionList.innerHTML = `<option value="">Kayıtlı sohbet seç</option>`;

  Object.keys(sessions).forEach(name => {
    const option = document.createElement("option");
    option.value = name;
    option.textContent = name;
    sessionList.appendChild(option);
  });
}

function loadSelectedSession(){
  const sessionList = document.getElementById("sessionList");
  const name = sessionList.value;
  if(!name) return;

  const sessions = getAllSessions();
  chatHistory = sessions[name] || [];
  currentSessionName = name;

  document.getElementById("sessionName").value = name;

  chatBox.innerHTML = "";
  chatHistory.forEach(msg => {
    addMessage(msg.type, msg.content, false);
  });

  localStorage.setItem("zanistarast_chat", JSON.stringify(chatHistory));
}
function deleteSelectedSession(){
  const sessionList = document.getElementById("sessionList");
  const name = sessionList.value;

  if(!name){
    alert("Silmek için önce kayıtlı bir sohbet seç.");
    return;
  }

  const ok = confirm("Bu sohbet silinsin mi: " + name + "?");
  if(!ok) return;

  const sessions = getAllSessions();
  delete sessions[name];

  saveAllSessions(sessions);
  refreshSessionList();

  if(currentSessionName === name){
    newChatSession();
  }

  alert("Sohbet silindi: " + name);
}
function newChatSession(){
  chatHistory = [];
  currentSessionName = "sohbet-" + new Date().toLocaleString("tr-TR");

  chatBox.innerHTML = "";
  input.value = "";
  output.innerHTML = "";
  suggestions.innerHTML = "";
  lastAnswer = "";

  document.getElementById("sessionName").value = currentSessionName;
  localStorage.removeItem("zanistarast_chat");
}
// Kaydet
function saveChat(){
  localStorage.setItem("zanistarast_chat", JSON.stringify(chatHistory));
}

// Yükle
function loadChat(){
  const data = localStorage.getItem("zanistarast_chat");

  if(data){
    chatHistory = JSON.parse(data);

    chatHistory.forEach(msg => {
      addMessage(msg.type, msg.content, false);
    });
  }
}
const chatBox = document.getElementById("chatBox");

function addMessage(type, content, save = true){
  const div = document.createElement("div");
  div.className = type === "user" ? "message user-message" : "message ai-message";

  const time = new Date().toLocaleTimeString("tr-TR", {
    hour: "2-digit",
    minute: "2-digit"
  });

  const index = chatHistory.length;

  div.innerHTML = `
    <div class="message-content">${content}</div>
    <div class="message-meta">
      <span>${time}</span>
      <button onclick="copyMessage(this)">Kopyala</button>
      <button onclick="deleteMessage(this)">Sil</button>
    </div>
  `;

  div.dataset.index = index;
  chatBox.appendChild(div);

  if(save){
    chatHistory.push({ type, content });
    saveChat();
  }

  div.scrollIntoView({ behavior:"smooth", block:"end" });
}

  chatBox.appendChild(div);

  if(save){
    chatHistory.push({ type, content });
    saveChat();
  }

  div.scrollIntoView({ behavior:"smooth", block:"end" });
}
function copyMessage(btn){
  const message = btn.closest(".message").querySelector(".message-content").innerText;
  navigator.clipboard.writeText(message);
  btn.innerText = "Kopyalandı";
  setTimeout(()=> btn.innerText = "Kopyala", 1200);
}
function deleteMessage(btn){
  const messageDiv = btn.closest(".message");
  const index = Number(messageDiv.dataset.index);

  chatHistory.splice(index, 1);
  saveChat();

  chatBox.innerHTML = "";
  chatHistory.forEach(msg => {
    addMessage(msg.type, msg.content, false);
  });
}
function downloadChat(){
  if(!chatHistory.length){
    alert("İndirilecek geçmiş yok.");
    return;
  }
function copyAllChat(){
  if(!chatHistory.length){
    alert("Kopyalanacak sohbet yok.");
    return;
  }

  const text = chatHistory.map(msg => {
    const who = msg.type === "user" ? "Kullanıcı" : "Zanistarast AI";
    return `${who}: ${msg.content.replace(/<[^>]*>/g, "")}`;
  }).join("\n\n");

  navigator.clipboard.writeText(text);
  alert("Tüm sohbet kopyalandı.");
}
  const text = chatHistory.map(msg => {
    const who = msg.type === "user" ? "Kullanıcı" : "Zanistarast AI";
    return `${who}: ${msg.content.replace(/<[^>]*>/g, "")}`;
  }).join("\n\n");

  const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "zanistarast-chat-gecmisi.txt";
  a.click();

  URL.revokeObjectURL(url);
}
let recognition = null;

function answer(q){
  const s = q.toLowerCase();
  const lang = languageSelect.value;

  function autoTranslate(text){
    if(lang === "tr-TR") return text;
    if(lang === "en-US") return text;
    return text + " (" + lang + ")";
  }

  if(lang === "en-US"){
    return autoTranslate(`
      <h3>ZANISTARAST ANALYSIS</h3>
      <p>This topic is not directly answered. It is analyzed through existence (Hebûn), knowledge (Zanabûn), and management (Rabûn).</p>
    `);
  }

  if(lang === "ku-TR"){
    return autoTranslate(`
      <h3>ANALÎZA ZANISTARAST</h3>
      <p>Ev mijar rasterast nayê bersivandin. Ew bi Hebûn, Zanabûn û Rabûn tê analîz kirin.</p>
    `);
  }

  // ====== HEBUN ======
  if(s.includes("hebun") || s.includes("hebûn")){
    return `
<h3>HEBÛN ONTOLOJİK DÜZENİ</h3>

<p><b>Hebûn</b>, Zanistarast bilimsel sentezinde varlığın temel ontolojik düzenini ifade eder. 
Bu kavram, varlığın sadece mevcut olmasını değil, aynı zamanda katmanlı bir yapı içerisinde 
düzenli ve anlamlı bir sistem olarak var olmasını açıklar.</p>

<h4>1. Katmanlı Varlık Yapısı</h4>
<p>Hebûn, varlığı tek boyutlu değil, çok katmanlı bir yapı olarak ele alır. Bu yapı:</p>
<ul>
<li>Fiziksel katman</li>
<li>Biyolojik katman</li>
<li>Zihinsel katman</li>
<li>Ruhsal/derin bilinç katmanı</li>
<li>İnsani/ahlaki katman</li>
<li>Ahiret/üst varlık katmanı</li>
</ul>

<p>Bu sistem <b>6+Ehad</b> yapısı ile tamamlanır. Ehad, tüm katmanların birliğini temsil eder.</p>

<h4>2. Merkez-Çevre İlişkisi</h4>
<p>Hebûn düzeninde her varlık bir merkez ve o merkeze bağlı bir çevre ile tanımlanır. 
Merkez anlam üretir, çevre ise bu anlamın yayılımını sağlar.</p>

<h4>3. Dinamik Varlık</h4>
<p>Hebûn statik bir varlık anlayışı değildir. Sürekli oluş, dönüşüm ve yeniden yapılanma içerir.</p>

<h4>4. Zanistarast İçindeki Yeri</h4>
<p>Hebûn, sistemin ontolojik temelidir. Üzerine şu yapılar kurulur:</p>
<ul>
<li>Zanabûn → Bilgi (epistemoloji)</li>
<li>Mabûn → Ekonomi / sürdürülebilirlik</li>
<li>Rabûn → Yönetim modeli</li>
</ul>

<p><b>Sonuç:</b> Hebûn, varlığın sadece “olduğu” değil, “nasıl ve neden düzen içinde var olduğu” sorusunun cevabıdır.</p>
`;
  }

  // ====== ZANİSTARAST ======
  if(s.includes("zanistarast")){
    return `
<h3>ZANİSTARAST BİLİMSEL SENTEZİ</h3>

<p>Zanistarast, ontoloji, epistemoloji ve yönetim sistemlerini tek bir çatı altında birleştiren 
yapısal bir bilim modelidir.</p>

<h4>1. Temel Yapı</h4>
<ul>
<li>Hebûn → Ontolojik düzen</li>
<li>Zanabûn → Bilgi üretimi</li>
<li>Mabûn → Ekonomik yapı</li>
<li>Rabûn → Yönetim modeli</li>
</ul>

<h4>2. Amaç</h4>
<p>Doğa ile uyumlu, sürdürülebilir ve doğrulanabilir bir sistem kurmak.</p>

<h4>3. Yöntem</h4>
<p>Her bilgi önce varlık düzleminde konumlandırılır, sonra merkez-çevre ilişkisi ile analiz edilir.</p>

<h4>4. Sonuç</h4>
<p>Zanistarast, ideoloji değil; test edilebilir yapısal bir modeldir.</p>
`;
  }

  // ====== DEFAULT ======
  return `
<h3>ZANİSTARAST ANALİZİ</h3>

<p>Bu konu Zanistarast sisteminde doğrudan cevaplanmaz. Önce varlık düzlemine (Hebûn) yerleştirilir, 
ardından bilgi (Zanabûn) ve yönetim (Rabûn) ilişkileri ile analiz edilir.</p>

<p>Daha spesifik bir kavram sorarsan, sana makale düzeyinde detaylı açıklama verebilirim.</p>
`;
}
function getSuggestions(q){
  const s = q.toLowerCase();

  if(s.includes("hebun") || s.includes("hebûn")){
    return [
      "Hebûn ile Zanabûn arasındaki fark nedir?",
      "Hebûn ontolojik düzeni kaç katmandan oluşur?",
      "6+Ehad yapısı ne anlama gelir?"
    ];
  }

  if(s.includes("zanistarast")){
    return [
      "Zanistarast bilimsel sentezi nedir?",
      "Rasterast doğrulama filtresi nasıl çalışır?",
      "Zanistarast ideolojiden nasıl ayrılır?"
    ];
  }

  return [
    "Bu konuyu Hebûn açısından açıklar mısın?",
    "Bu konunun Zanabûn bilgi yönü nedir?",
    "Bu konu Rabûn yönetim modeliyle nasıl ilişkilidir?"
  ];
}

function renderSuggestions(q){
  const list = getSuggestions(q);

  suggestions.innerHTML = `
    <h4>Konuyla ilgili şunları da sorabilirsin:</h4>
    ${list.map(item => `
      <button onclick="askSuggestion('${item.replace(/'/g, "\\'")}')">${item}</button>
    `).join("")}
  `;
}

function askSuggestion(text){
  input.value = text;
  ask();
}

function ask(){
  const q = input.value.trim();
  if(!q) return;

  addMessage("user", q);
  thinking.classList.add("show");
  input.value = "";

  setTimeout(()=>{
    lastAnswer = answer(q);
    addMessage("ai", lastAnswer);

    output.innerHTML = "";
    renderSuggestions(q);
    thinking.classList.remove("show");
  },500);
}

function answer(q){
  const s = q.toLowerCase();

  if(s.includes("hebun") || s.includes("hebûn")){
    return `
      <h3>Hebûn Nedir?</h3>
      <p>Hebûn, varlığın ontolojik temelidir. Tüm sistemlerin başlangıç noktasıdır.</p>
      <p>Zanistarast yaklaşımında Hebûn, varlığın kendisini ifade eder.</p>
    `;
  }

  if(s.includes("zanabun") || s.includes("zanabûn")){
    return `
      <h3>Zanabûn Nedir?</h3>
      <p>Zanabûn, bilginin oluşum sürecidir. Varlığın anlaşılmasıdır.</p>
    `;
  }

  if(s.includes("rabun") || s.includes("rabûn")){
    return `
      <h3>Rabûn Nedir?</h3>
      <p>Rabûn, yönetim ve düzen kurma sürecidir.</p>
    `;
  }

  if(s.includes("zanistarast")){
    return `
      <h3>Zanistarast</h3>
      <p>Zanistarast; Hebûn (varlık), Zanabûn (bilgi) ve Rabûn (yönetim) üçlüsünü birleştiren sistemdir.</p>
    `;
  }

  if(s.includes("merhaba")){
    return "Merhaba, Zanistarast AI sistemine hoş geldin.";
  }

  return `
    <p>Bu konu Zanistarast analizine göre Hebûn, Zanabûn ve Rabûn çerçevesinde değerlendirilir.</p>
  `;
}

function readAnswer(){
  if(!lastAnswer) return;

  speechSynthesis.cancel();

  const cleanText = lastAnswer.replace(/<[^>]*>/g, "");
  const u = new SpeechSynthesisUtterance(cleanText);

  u.lang = languageSelect.value;

  if(!speechSynthesis.getVoices().find(v => v.lang === u.lang)){
    u.lang = "en-US";
  }

  speechSynthesis.speak(u);
}

function clearBox(){
  input.value="";
  output.innerHTML="";
  suggestions.innerHTML="";
  chatBox.innerHTML="";
  lastAnswer="";
  chatHistory = [];
  localStorage.removeItem("zanistarast_chat");
  thinking.classList.remove("show");
}

function startListen(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

  if(!SR){
    output.innerHTML="Bu tarayıcı konuşma algılamayı desteklemiyor.";
    return;
  }

  recognition = new SR();
  recognition.lang = languageSelect.value;
  recognition.interimResults = true;

  recognition.onresult = e=>{
    let text="";
    for(let i=0;i<e.results.length;i++){
      text += e.results[i][0].transcript;
    }
    input.value = text;
  };

  recognition.start();
}

function stopListen(){
  if(recognition) recognition.stop();
}

window.onload = function(){
  loadChat();
  refreshSessionList();
};
</script>
</body>
</html>
