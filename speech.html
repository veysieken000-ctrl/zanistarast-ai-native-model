<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zanistarast Voice</title>

  <style>
    :root {
      --bg-1: #0a0f1c;
      --bg-2: #11182a;
      --panel: rgba(17, 24, 39, 0.82);
      --panel-2: rgba(11, 17, 30, 0.92);
      --border: rgba(255, 255, 255, 0.08);
      --text: #f8fbff;
      --muted: #a8b3c7;
      --primary: #8ab4ff;
      --primary-2: #b388ff;
      --success: #57e389;
      --danger: #ff7b8a;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      color: var(--text);
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(138, 180, 255, 0.18), transparent 24%),
        radial-gradient(circle at top right, rgba(179, 136, 255, 0.14), transparent 22%),
        linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 100%);
    }

    .app-shell {
      max-width: 1280px;
      margin: 0 auto;
      padding: 28px 18px 40px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 18px 22px;
      border-radius: var(--radius-xl);
      background: rgba(10, 15, 28, 0.62);
      border: 1px solid var(--border);
      backdrop-filter: blur(16px);
      box-shadow: var(--shadow);
      margin-bottom: 22px;
    }

    .chat-thread {
  min-height: 360px;
  max-height: 460px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 12px;
  padding: 10px 4px 16px;
  margin-bottom: 18px;
}

    .brand-mark {
      width: 52px;
      height: 52px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      font-size: 22px;
      font-weight: 900;
      color: white;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      box-shadow: 0 10px 25px rgba(138, 180, 255, 0.28);
    }

    .brand h1 {
      margin: 0 0 4px;
      font-size: 31px;
      line-height: 1.1;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .brand p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .lang-select {
      min-width: 180px;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 12px 16px;
      background: var(--panel-2);
      color: var(--text);
      font-size: 14px;
      outline: none;
    }

    .main {
  display: grid;
  grid-template-columns: minmax(0, 1.7fr) minmax(280px, 0.9fr);
  gap: 28px;
  align-items: center; /* BURASI KRİTİK */
  max-width: 1180px;
  margin: 40px auto;
}
   .left-column {
  display: flex;
  flex-direction: column;
  justify-content: center;
}

    .input-card,
    .answer-card,
    .status-card {
      border-radius: var(--radius-xl);
      background: var(--panel);
      border: 1px solid var(--border);
      backdrop-filter: blur(16px);
      box-shadow: var(--shadow);
    }

    .input-card,
    .answer-card {
      padding: 18px;
    }

    .composer textarea {
  width: 100%;
  min-height: 170px;
  resize: vertical;
  border: 1px solid rgba(138, 180, 255, 0.16);
  border-radius: var(--radius-lg);
  background: #0b1324;
  color: var(--text);
  padding: 20px;
  font-size: 18px;
  line-height: 1.7;
  outline: none;
  margin-bottom: 16px;
}
    .prompt-input::placeholder {
      color: #7f8aa0;
    }

    .prompt-toolbar {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-top: 4px;
}

.prompt-toolbar button {
  border: 0;
  border-radius: 999px;
  padding: 12px 18px;
  font-size: 14px;
  font-weight: 800;
  cursor: pointer;
  color: #ffffff;
  transition: transform 0.15s ease, opacity 0.15s ease;
}

.prompt-toolbar button:hover {
  transform: translateY(-1px);
  opacity: 0.95;
}

#startBtn {
  background: #1faa59;
}

#stopBtn {
  background: #d64545;
}

#sendBtn {
  background: #d4a017;
  color: #111111;
}

#speakBtn {
  background: #6b7280;
}

#clearBtn {
  background: #7a4b2a;
}

    .btn {
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      opacity: 0.95;
    }

    .btn-soft {
      color: var(--text);
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--border);
    }

    .btn-primary {
      color: white;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      box-shadow: 0 10px 25px rgba(138, 180, 255, 0.22);
    }

    .btn-danger {
      color: #ffd7dd;
      background: rgba(255, 123, 138, 0.14);
      border: 1px solid rgba(255, 123, 138, 0.22);
    }

    .answer-head {
      margin-bottom: 14px;
      color: var(--muted);
      font-weight: 700;
      font-size: 15px;
    }

    .answer-output {
      min-height: 240px;
      border-radius: var(--radius-lg);
      border: 1px solid rgba(138, 180, 255, 0.16);
      background: #0b1324;
      padding: 18px;
      font-size: 16px;
      line-height: 1.65;
      white-space: pre-wrap;
    }

    .answer-meta {
      margin-top: 14px;
      display: grid;
      gap: 10px;
    }

    .pill {
      display: inline-flex;
      width: fit-content;
      align-items: center;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.07);
      color: #eef3ff;
      font-size: 13px;
      font-weight: 700;
    }

    .meta-line {
      color: var(--muted);
      font-size: 13px;
      white-space: pre-wrap;
    }

   .panel {
  border-radius: var(--radius-xl);
  background: var(--panel);
  border: 1px solid var(--border);
  backdrop-filter: blur(16px);
  box-shadow: var(--shadow);
  padding: 20px;
  max-width: 920px;
  width: 100%;
  margin: 0 auto;
}

.chat-thread {
  min-height: 180px;
  max-height: 320px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 12px;
  padding: 10px 4px 14px;
  margin-bottom: 14px;
}

.composer textarea {
  width: 100%;
  min-height: 120px;
  resize: vertical;
  border: 1px solid rgba(138, 180, 255, 0.16);
  border-radius: var(--radius-lg);
  background: #0b1324;
  color: var(--text);
  padding: 18px;
  font-size: 18px;
  line-height: 1.6;
  outline: none;
  margin-bottom: 14px;
}

.panel-brand-title {
  font-size: 26px;
  font-weight: 900;
  line-height: 1.1;
}

.panel-brand-sub {
  margin-top: 4px;
  font-size: 13px;
  color: var(--muted);
}
 
.panel-status-top {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 14px;
  margin-bottom: 18px;
}

.panel-status-bottom {
  display: flex;
  justify-content: flex-end;
  margin-top: 16px;
}

.status-chip {
  position: relative;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  border-radius: 20px;
  background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03));
  border: 1px solid rgba(255,255,255,0.08);
  backdrop-filter: blur(14px);
  box-shadow: 0 12px 32px rgba(0,0,0,0.22);
  overflow: hidden;
}

.status-chip::before {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at top left, rgba(255,255,255,0.08), transparent 38%);
  pointer-events: none;
}

.status-chip-icon {
  width: 42px;
  height: 42px;
  min-width: 42px;
  border-radius: 14px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 19px;
  font-weight: 900;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
}

.status-chip-content {
  display: flex;
  flex-direction: column;
  gap: 5px;
  min-width: 0;
}

.status-chip-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: #9fb0c8;
  font-weight: 800;
  line-height: 1;
}

.status-chip-value {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  min-height: 28px;
  font-size: 20px;
  font-weight: 900;
  line-height: 1.1;
  color: #ffffff;
  word-break: break-word;
}

.status-chip-mic .status-chip-icon {
  background: rgba(255, 120, 140, 0.14);
  border: 1px solid rgba(255, 120, 140, 0.24);
  color: #ffb3bf;
}

.status-chip-system .status-chip-icon {
  background: rgba(255, 208, 90, 0.14);
  border: 1px solid rgba(255, 208, 90, 0.24);
  color: #ffd76e;
}

.status-chip-lang .status-chip-icon {
  background: rgba(90, 150, 255, 0.16);
  border: 1px solid rgba(90, 150, 255, 0.28);
  color: #9ec5ff;
}

.status-chip-mode .status-chip-icon {
  background: rgba(178, 136, 255, 0.16);
  border: 1px solid rgba(178, 136, 255, 0.28);
  color: #ceb2ff;
}

#micStatus.mic-on {
  color: #5df2af;
}

#micStatus.mic-off {
  color: #ffb3bf;
}

#systemStatus.is-ready,
#systemStatus.is-done {
  color: #5df2af;
}

#systemStatus.is-thinking,
#systemStatus.is-speaking {
  color: #ffd76e;
}

#systemStatus.is-error {
  color: #ff9dad;
}

.status-chip-bottom {
  min-width: 220px;
}

.status-chip-value.thinking {
  display: inline-flex;
  align-items: center;
  gap: 4px;
}

.thinking-dots {
  display: inline-flex;
  min-width: 22px;
}

.thinking-dots span {
  display: inline-block;
  animation: thinkingBlink 1.4s infinite ease-in-out;
  opacity: 0.25;
}

.thinking-dots span:nth-child(2) {
  animation-delay: 0.2s;
}

.thinking-dots span:nth-child(3) {
  animation-delay: 0.4s;
}

@keyframes thinkingBlink {
  0%, 80%, 100% {
    opacity: 0.25;
    transform: translateY(0);
  }
  40% {
    opacity: 1;
    transform: translateY(-2px);
  }
}
#systemStatus.is-thinking,
#systemStatus.is-speaking {
  color: #ffd76e;
  text-shadow: 0 0 10px rgba(255, 215, 110, 0.22);
}

.status-chip-system {
  transition: box-shadow 0.25s ease, border-color 0.25s ease, transform 0.25s ease;
}

.status-chip-system:has(#systemStatus.is-thinking),
.status-chip-system:has(#systemStatus.is-speaking) {
  box-shadow: 0 0 18px rgba(255, 215, 110, 0.18);
  border-color: rgba(255, 215, 110, 0.28);
}

@media (max-width: 980px) {
  .panel-status-top {
    grid-template-columns: 1fr;
  }

  .panel-status-bottom {
    justify-content: stretch;
  }

  .status-chip-bottom {
    width: 100%;
  }
}


.mic-on {
  color: var(--success);
}

.mic-off {
  color: #ffb8c0;
}

.status-center-value.thinking {
  display: inline-flex !important;
  align-items: center !important;
  gap: 3px !important;
}

.thinking-dots {
  display: inline-flex !important;
  min-width: 24px !important;
}

.thinking-dots span {
  display: inline-block !important;
  opacity: 0.2;
  animation: thinkingBlink 1.2s ease-in-out infinite !important;
}

.thinking-dots span:nth-child(2) {
  animation-delay: 0.2s !important;
}

.thinking-dots span:nth-child(3) {
  animation-delay: 0.4s !important;
}

@keyframes thinkingBlink {
  0%, 80%, 100% {
    opacity: 0.2;
    transform: translateY(0);
  }
  40% {
    opacity: 1;
    transform: translateY(-2px);
  }
}

@media (max-width: 980px) {
  .status-overlay {
    min-height: 220px;
    margin-top: 8px;
  }

  .status-center {
    position: relative;
    top: auto;
    right: auto;
    transform: none;
    width: 100%;
    max-width: 100%;
    margin-top: 18px;
  }

  .status-top-right {
    top: 0;
    right: 0;
  }

  .status-bottom-left,
  .status-bottom-right {
    position: relative;
    left: auto;
    right: auto;
    bottom: auto;
    display: inline-block;
    margin-top: 14px;
  }

  .status-bottom-right {
    margin-left: 10px;
  }
}
    
    @media (max-width: 980px) {
  .main {
    grid-template-columns: 1fr;
    margin-top: 20px;
  }

  .panel {
    max-width: 100%;
  }
}
      .topbar {
        flex-direction: column;
        align-items: stretch;
      }

      .lang-select {
        width: 100%;
      }

      .brand h1 {
        font-size: 25px;
      }
    }
 .status-chip-value.thinking {
  display: inline-flex;

}

}

.thinking-dots span {

  animation: thinkingBlink 1.4s infinite ease-in-out;

}

}

}

}

  padding: 12px 14px;

  box-shadow: 0 10px 30px rgba(0,0,0,0.18);
}

}

.status-chip-value {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  min-height: 34px;
  padding: 8px 14px;
  border-radius: 999px;
  font-size: 18px;
  font-weight: 900;
  line-height: 1;
  border: 1px solid transparent;
}

/* dil */
#langStatus.status-chip-value {
  background: rgba(90, 150, 255, 0.16);
  color: #9ec5ff;
  border-color: rgba(90, 150, 255, 0.28);
}

/* mikrofon */
#micStatus.status-chip-value.mic-on {
  background: rgba(66, 211, 146, 0.16);
  color: #5df2af;
  border-color: rgba(66, 211, 146, 0.28);
}

#micStatus.status-chip-value.mic-off {
  background: rgba(255, 120, 140, 0.14);
  color: #ffb3bf;
  border-color: rgba(255, 120, 140, 0.24);
}

/* sistem */
#systemStatus.status-chip-value {
  background: rgba(255,255,255,0.06);
  color: #ffffff;
  border-color: rgba(255,255,255,0.08);
}

#systemStatus.status-chip-value.is-ready,
#systemStatus.status-chip-value.is-done {
  background: rgba(66, 211, 146, 0.16);
  color: #5df2af;
  border-color: rgba(66, 211, 146, 0.28);
}

#systemStatus.status-chip-value.is-thinking,
#systemStatus.status-chip-value.is-speaking {
  background: rgba(255, 208, 90, 0.16);
  color: #ffd76e;
  border-color: rgba(255, 208, 90, 0.28);
}

#systemStatus.status-chip-value.is-error {
  background: rgba(255, 120, 140, 0.14);
  color: #ffb3bf;
  border-color: rgba(255, 120, 140, 0.24);
}

/* mode */
#modeStatus.status-chip-value {
  background: rgba(178, 136, 255, 0.16);
  color: #ceb2ff;
  border-color: rgba(178, 136, 255, 0.28);
}

.status-chip-center {
  text-align: center;
}

.status-chip-center .status-chip-value {
  justify-content: center;
  width: 100%;
}

.status-chip-bottom {
  min-width: 210px;
}

@media (max-width: 980px) {
  .panel-status-top {
    grid-template-columns: 1fr;
  }

  .status-chip-bottom {
    min-width: 100%;
  }
} 
  
  </style>
</head>
<body>
  <div class="app-shell">
    <main class="main">
      <div class="left-column">

<section class="panel">

  <div class="panel-topbar">
    <div class="panel-top-left">
      <div class="panel-brand-title">Zanistarast Voice</div>
      <div class="panel-brand-sub">Speak or type. Clean. Fast. Stable.</div>
    </div>

    <div class="panel-top-right">
      <select id="languageSelect" class="lang-select">
        <option value="en-US">English</option>
        <option value="tr-TR">Turkish</option>
        <option value="ar-SA">Arabic</option>
        <option value="ku-TR">Kurmanji</option>
        <option value="fa-IR">Persian</option>
        <option value="fr-FR">French</option>
        <option value="zh-CN">Chinese</option>
        <option value="ru-RU">Russian</option>
        <option value="es-ES">Spanish</option>
        <option value="sv-SE">Swedish</option>
        <option value="no-NO">Norwegian</option>
        <option value="de-DE">German</option>
        <option value="it-IT">Italian</option>
        <option value="ja-JP">Japanese</option>
      </select>
    </div>
  </div>

  <div class="panel-status-top">
  <div class="status-chip status-chip-mic">
    <div class="status-chip-icon">🎤</div>
    <div class="status-chip-content">
      <span class="status-chip-label">Microphone</span>
      <span id="micStatus" class="status-chip-value mic-off">Off</span>
    </div>
  </div>

  <div class="status-chip status-chip-system">
    <div class="status-chip-icon">⚡</div>
    <div class="status-chip-content">
      <span class="status-chip-label">System</span>
      <span id="systemStatus" class="status-value">Ready</span>
    </div>
  </div>

  <div class="status-chip status-chip-lang">
    <div class="status-chip-icon">🌐</div>
    <div class="status-chip-content">
      <span class="status-chip-label">Listening Language</span>
      <span id="langStatus" class="status-chip-value">en-US</span>
    </div>
  </div>
</div>
  
  <div class="chat-thread" id="chatThread"></div>

  <div class="composer">
    <textarea id="questionInput" placeholder="Bir şey yaz veya konuş..."></textarea>

    <div class="prompt-toolbar">
      <button id="startBtn">🎤 Başla</button>
      <button id="stopBtn">■ Durdur</button>
      <button id="sendBtn">➤ Gönder</button>
      <button id="speakBtn">🔊 Oku</button>
      <button id="clearBtn">✖ Temizle</button>
    </div>
  </div>

 <div class="panel-status-bottom">
  <div class="status-chip status-chip-mode status-chip-bottom">
    <div class="status-chip-icon">⚙️</div>
    <div class="status-chip-content">
      <span class="status-chip-label">Mode</span>
      <span id="modeStatus" class="status-chip-value">manual</span>
    </div>
  </div>
</div>
</section>

</div>
</main>
</div> 
  
  <script src="modules/ui/status.js"></script>
  <script src="modules/ui/renderer.js"></script>

  <script src="modules/speech/state.js"></script>
  <script src="modules/speech/input.js"></script>
  <script src="modules/speech/output.js"></script>

  <script src="modules/ai/request.js"></script>
  <script src="modules/ai/response.js"></script>

  <script src="modules/ui/bindings.js"></script>
</body>
</html>
