<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zanistarast Speech Interface</title>
  <style>
    :root {
      --bg-1: #07111f;
      --bg-2: #0a1628;
      --card: rgba(17, 29, 49, 0.92);
      --card-2: rgba(13, 24, 42, 0.95);
      --border: rgba(122, 162, 255, 0.14);
      --text: #f6f9ff;
      --muted: #b9c7de;
      --shadow: 0 18px 44px rgba(0, 0, 0, 0.35);

      --blue: #7dd3fc;
      --cyan: #48e5d2;
      --violet: #a78bfa;
      --pink: #ff8bb8;
      --gold: #ffd36a;
      --green: #3fe39a;
      --red: #ff7f96;
      --panel-glow: rgba(73, 144, 255, 0.12);
    }

    * {
      box-sizing: border-box;
    }
    #languageSelect {
  background: linear-gradient(180deg, #17263d, #0f1b2d);
  color: #ffffff;
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: 16px;
  min-width: 190px;
  height: 50px;
  padding: 0 16px;
  font-size: 15px;
  font-weight: 800;
  outline: none;
  cursor: pointer;
  box-shadow: 0 12px 26px rgba(0, 0, 0, 0.22);
  appearance: none;
  -webkit-appearance: none;
  -moz-appearance: none;
}

#languageSelect:hover {
  filter: brightness(1.06);
}

#languageSelect:focus {
  border-color: rgba(125, 249, 255, 0.45);
  box-shadow: 0 0 0 4px rgba(125, 249, 255, 0.10);
}

#languageSelect option {
  background: #101a2b;
  color: #ffffff;
}
    .toolbar {
  position: relative;
}

.language-wrap {
  position: relative;
  display: inline-block;
}

.language-wrap::after {
  content: "▾";
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: #ffffff;
  pointer-events: none;
  font-size: 14px;
  opacity: 0.85;
}
    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(77, 124, 255, 0.18), transparent 28%),
        radial-gradient(circle at top right, rgba(72, 229, 210, 0.10), transparent 22%),
        linear-gradient(180deg, var(--bg-1), var(--bg-2));
      min-height: 100vh;
      padding: 24px 14px 56px;
    }

    .wrap {
      max-width: 1180px;
      margin: 0 auto;
    }

    .hero,
    .panel {
      border: 1px solid var(--border);
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(11, 21, 37, 0.98), rgba(8, 15, 28, 0.98));
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 28px 24px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 4vw, 48px);
      line-height: 1.05;
      letter-spacing: -0.03em;
      font-weight: 900;
    }

    .subtitle {
      margin: 14px 0 0;
      color: var(--muted);
      max-width: 920px;
      line-height: 1.7;
      font-size: 17px;
    }

    .panel {
      padding: 18px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin-bottom: 16px;
    }

    .toolbar button,
    .toolbar select {
      border: 0;
      border-radius: 16px;
      font-size: 15px;
      font-weight: 800;
      min-height: 50px;
      padding: 0 16px;
      box-shadow: 0 12px 26px rgba(0, 0, 0, 0.22);
    }

    .toolbar button {
      cursor: pointer;
      color: white;
      transition: transform .15s ease, box-shadow .15s ease, opacity .15s ease;
    }

    .toolbar button:hover {
      transform: translateY(-1px);
      box-shadow: 0 16px 30px rgba(0, 0, 0, 0.26);
    }

    .toolbar button:active {
      transform: translateY(0);
    }

   #startBtn {
  background: linear-gradient(135deg, #7df9ff, #38bdf8);
  color: #07111f;
}

#stopBtn {
  background: linear-gradient(135deg, #64748b, #334155);
  color: #ffffff;
}

#sendBtn {
  background: linear-gradient(135deg, #c084fc, #8b5cf6);
  color: #ffffff;
}

#speakBtn {
  background: linear-gradient(135deg, #34d399, #06b6d4);
  color: #07111f;
}

#clearBtn {
  background: linear-gradient(135deg, #fb7185, #ef4444);
  color: #ffffff;
}

.toolbar button {
  cursor: pointer;
  transition: all 0.2s ease;
  border: 1px solid rgba(255,255,255,0.1);
}

.toolbar button:hover {
  transform: translateY(-2px);
  filter: brightness(1.1);
}
    #languageSelect {
      background: linear-gradient(180deg, rgba(18, 30, 50, 1), rgba(13, 22, 38, 1));
      color: var(--text);
      border: 1px solid rgba(255, 255, 255, 0.08);
      min-width: 180px;
      cursor: pointer;
      outline: none;
    }

    .status-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }

    .status-card {
      border-radius: 18px;
      padding: 14px 16px;
      background: linear-gradient(180deg, rgba(15, 27, 47, 1), rgba(10, 19, 34, 1));
      border: 1px solid rgba(255, 255, 255, 0.07);
      box-shadow: inset 0 0 0 1px rgba(73, 144, 255, 0.04);
    }

    .status-label {
      font-size: 12px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .status-value {
      font-size: 22px;
      font-weight: 900;
    }

    .mic-on {
      color: var(--green);
    }

    .mic-off {
      color: var(--red);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .box {
      border-radius: 22px;
      padding: 18px;
      background:
        linear-gradient(180deg, rgba(17, 31, 54, 0.98), rgba(11, 23, 42, 0.98));
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.02),
        0 0 0 1px var(--panel-glow);
      min-height: 480px;
      display: flex;
      flex-direction: column;
    }

    .box h2 {
      margin: 0 0 12px;
      font-size: 28px;
      font-weight: 900;
      letter-spacing: -0.02em;
    }

    textarea {
      width: 100%;
      min-height: 280px;
      resize: vertical;
      border-radius: 18px;
      border: 1px solid rgba(122, 211, 252, 0.18);
      outline: none;
      background: rgba(8, 17, 31, 0.92);
      color: var(--text);
      padding: 18px;
      font-size: 20px;
      line-height: 1.65;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02);
    }

    textarea:focus {
      border-color: rgba(122, 211, 252, 0.42);
      box-shadow: 0 0 0 4px rgba(122, 211, 252, 0.08);
    }

    .hint {
      margin-top: 12px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    .answer {
      flex: 1;
      min-height: 280px;
      border-radius: 18px;
      border: 1px solid rgba(122, 211, 252, 0.16);
      background: rgba(7, 16, 29, 0.94);
      padding: 18px;
      font-size: 17px;
      line-height: 1.75;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .answer-section-title {
      display: block;
      margin: 16px 0 6px;
      font-size: 18px;
      font-weight: 900;
      line-height: 1.4;
    }

    .title-ontological { color: var(--blue); }
    .title-epistemic { color: var(--cyan); }
    .title-structural { color: var(--violet); }
    .title-ethical { color: var(--pink); }
    .title-final { color: var(--gold); }

    .classification {
      margin-top: 12px;
      display: inline-flex;
      align-self: flex-start;
      padding: 10px 15px;
      border-radius: 999px;
      font-weight: 900;
      background: rgba(255, 255, 255, 0.05);
    }

    .classification.truth {
      background: rgba(63, 227, 154, 0.14);
      color: #8bffcb;
    }

    .classification.false {
      background: rgba(255, 127, 150, 0.14);
      color: #ff9caf;
    }

    .classification.unknown {
      background: rgba(255, 211, 106, 0.14);
      color: #ffe095;
    }

    .meta {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed rgba(255, 255, 255, 0.10);
      color: #d5e1f4;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .footer-note {
      margin-top: 14px;
      text-align: center;
      color: #9db0cc;
      font-size: 13px;
    }

    @media (max-width: 980px) {
      .status-grid,
      .grid {
        grid-template-columns: 1fr;
      }

      .toolbar button,
      .toolbar select {
        width: 100%;
      }

      textarea,
      .answer {
        font-size: 17px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>Zanistarast Speech Interface</h1>
      <p class="subtitle">
        Speak or type your question, send it to the backend, view the answer in a structured way,
        and read it aloud if needed. This version is built to be clean, stable, and practical.
      </p>
    </section>

    <section class="panel">
      <div class="toolbar">
        <button id="startBtn" type="button" 🎙️ Start</button>
        <button id="stopBtn" type="button" ⏹ Stop</button>
        <button id="sendBtn" type="button" 📤 Send</button>
        <button id="speakBtn" type="button" 🔊 Speak</button>
        <button id="clearBtn" type="button" 🧹 Clear</button>

      <div class="language-wrap">
  <select id="languageSelect">
    <option value="en-US">English</option>
    <option value="tr-TR">Turkish</option>
    <option value="ar-SA">Arabic</option>
    <option value="ku-TR">Kurmanji</option>
    <option value="fa-IR">Persian</option>
    <option value="fr-FR">French</option>
    <option value="zh-CN">Chinese</option>
    <option value="ru-RU">Russian</option>
    <option value="es-ES">Spanish</option>
    <option value="sv-SE">Swedish</option>
    <option value="no-NO">Norwegian</option>
    <option value="de-DE">German</option>
    <option value="it-IT">Italian</option>
    <option value="ja-JP">Japanese</option>
  </select>
      </div>
   <div class="status-grid">
        <div class="status-card">
          <div class="status-label">Microphone</div>
          <div id="micStatus" class="status-value mic-off">Off</div>
        </div>

        <div class="status-card">
          <div class="status-label">System</div>
          <div id="systemStatus" class="status-value">Ready</div>
        </div>

        <div class="status-card">
          <div class="status-label">Listening Language</div>
          <div id="langStatus" class="status-value">en-US</div>
        </div>

        <div class="status-card">
          <div class="status-label">Mode</div>
          <div id="modeStatus" class="status-value">Manual</div>
        </div>
      </div>

      <div class="grid">
        <div class="box">
          <h2>Question</h2>
          <textarea id="questionInput" placeholder="Speak or type your question here..."></textarea>
          <div class="hint">
            Choose the listening language first, then press Start. Browser speech recognition does not reliably detect all languages at once.
          </div>
        </div>

        <div class="box">
          <h2>Answer</h2>
          <div id="answerOutput" class="answer">No answer yet.</div>
          <div id="classificationBox" class="classification unknown">Classification: None</div>
          <div id="metaOutput" class="meta">No source metadata yet.</div>
        </div>
      </div>

      <div class="footer-note">Tip: press Ctrl + Enter to send quickly.</div>
    </section>
  </div>

<script src="modules/ai/ai.js"></script>
<script src="modules/speech/speech.js"></script>

</body>
</html>
