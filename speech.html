<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zanistarast Voice</title>

  <style>
    :root {
      --bg-1: #0a0f1c;
      --bg-2: #11182a;
      --panel: rgba(17, 24, 39, 0.82);
      --panel-2: rgba(11, 17, 30, 0.92);
      --border: rgba(255, 255, 255, 0.08);
      --text: #f8fbff;
      --muted: #a8b3c7;
      --primary: #8ab4ff;
      --primary-2: #b388ff;
      --success: #57e389;
      --danger: #ff7b8a;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      color: var(--text);
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(138, 180, 255, 0.18), transparent 24%),
        radial-gradient(circle at top right, rgba(179, 136, 255, 0.14), transparent 22%),
        linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 100%);
    }

    .app-shell {
      max-width: 1280px;
      margin: 0 auto;
      padding: 28px 18px 40px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 18px 22px;
      border-radius: var(--radius-xl);
      background: rgba(10, 15, 28, 0.62);
      border: 1px solid var(--border);
      backdrop-filter: blur(16px);
      box-shadow: var(--shadow);
      margin-bottom: 22px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand-mark {
      width: 52px;
      height: 52px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      font-size: 22px;
      font-weight: 900;
      color: white;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      box-shadow: 0 10px 25px rgba(138, 180, 255, 0.28);
    }

    .brand h1 {
      margin: 0 0 4px;
      font-size: 31px;
      line-height: 1.1;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .brand p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .lang-select {
      min-width: 180px;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 12px 16px;
      background: var(--panel-2);
      color: var(--text);
      font-size: 14px;
      outline: none;
    }

    .main {
      display: grid;
      grid-template-columns: minmax(0, 1.7fr) minmax(280px, 0.9fr);
      gap: 20px;
      align-items: start;
    }

    .left-column {
      display: grid;
      gap: 18px;
    }

    .input-card,
    .answer-card,
    .status-card {
      border-radius: var(--radius-xl);
      background: var(--panel);
      border: 1px solid var(--border);
      backdrop-filter: blur(16px);
      box-shadow: var(--shadow);
    }

    .input-card,
    .answer-card {
      padding: 18px;
    }

    .prompt-input {
      width: 100%;
      min-height: 240px;
      resize: vertical;
      border: 1px solid rgba(138, 180, 255, 0.16);
      border-radius: var(--radius-lg);
      background: #0b1324;
      color: var(--text);
      padding: 18px;
      font-size: 17px;
      line-height: 1.6;
      outline: none;
    }

    .prompt-input::placeholder {
      color: #7f8aa0;
    }

    .prompt-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 16px;
    }

    .btn {
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      opacity: 0.95;
    }

    .btn-soft {
      color: var(--text);
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--border);
    }

    .btn-primary {
      color: white;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      box-shadow: 0 10px 25px rgba(138, 180, 255, 0.22);
    }

    .btn-danger {
      color: #ffd7dd;
      background: rgba(255, 123, 138, 0.14);
      border: 1px solid rgba(255, 123, 138, 0.22);
    }

    .answer-head {
      margin-bottom: 14px;
      color: var(--muted);
      font-weight: 700;
      font-size: 15px;
    }

    .answer-output {
      min-height: 240px;
      border-radius: var(--radius-lg);
      border: 1px solid rgba(138, 180, 255, 0.16);
      background: #0b1324;
      padding: 18px;
      font-size: 16px;
      line-height: 1.65;
      white-space: pre-wrap;
    }

    .answer-meta {
      margin-top: 14px;
      display: grid;
      gap: 10px;
    }

    .pill {
      display: inline-flex;
      width: fit-content;
      align-items: center;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.07);
      color: #eef3ff;
      font-size: 13px;
      font-weight: 700;
    }

    .meta-line {
      color: var(--muted);
      font-size: 13px;
      white-space: pre-wrap;
    }

    .status-panel {
      display: grid;
      gap: 16px;
    }

    .status-card {
      padding: 18px;
    }

    .status-label {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .status-value {
      font-size: 28px;
      line-height: 1.1;
      font-weight: 800;
    }

    .mic-on {
      color: var(--success);
    }

    .mic-off {
      color: #ffb8c0;
    }

    @media (max-width: 980px) {
      .main {
        grid-template-columns: 1fr;
      }

      .topbar {
        flex-direction: column;
        align-items: stretch;
      }

      .lang-select {
        width: 100%;
      }

      .brand h1 {
        font-size: 25px;
      }
    }
  </style>
</head>

<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">✦</div>
        <div>
          <h1>Zanistarast Voice</h1>
          <p>Speak or type. Clean. Fast. Stable.</p>
        </div>
      </div>

      <div class="topbar-actions">
        <select id="languageSelect" class="lang-select">
          <option value="en-US">English</option>
          <option value="tr-TR">Turkish</option>
          <option value="ar-SA">Arabic</option>
          <option value="ku-TR">Kurmanji</option>
          <option value="fa-IR">Persian</option>
          <option value="fr-FR">French</option>
          <option value="zh-CN">Chinese</option>
          <option value="ru-RU">Russian</option>
          <option value="es-ES">Spanish</option>
          <option value="sv-SE">Swedish</option>
          <option value="no-NO">Norwegian</option>
          <option value="de-DE">German</option>
          <option value="it-IT">Italian</option>
          <option value="ja-JP">Japanese</option>
        </select>
      </div>
    </header>

    <main class="main">
      <div class="left-column">
        <section class="input-card">
          <textarea id="questionInput" class="prompt-input" placeholder="Ask something..."></textarea>

          <div class="prompt-toolbar">
            <button id="startBtn" type="button" class="btn btn-soft">🎤 Start</button>
            <button id="stopBtn" type="button" class="btn btn-soft">■ Stop</button>
            <button id="sendBtn" type="button" class="btn btn-primary">➜ Send</button>
            <button id="speakBtn" type="button" class="btn btn-soft">🔊 Speak</button>
            <button id="clearBtn" type="button" class="btn btn-danger">✕ Clear</button>
          </div>
        </section>

        <section class="answer-card">
          <div class="answer-head">Answer</div>
          <div id="answerOutput" class="answer-output">No answer yet.</div>

          <div class="answer-meta">
            <div id="classificationBox" class="pill">Classification: None</div>
            <div id="metaOutput" class="meta-line">No source metadata yet.</div>
          </div>
        </section>
      </div>

      <aside class="status-panel">
        <div class="status-card">
          <div class="status-label">Microphone</div>
          <div id="micStatus" class="status-value mic-off">Off</div>
        </div>

        <div class="status-card">
          <div class="status-label">System</div>
          <div id="systemStatus" class="status-value">Ready</div>
        </div>

        <div class="status-card">
          <div class="status-label">Listening language</div>
          <div id="langStatus" class="status-value">en-US</div>
        </div>

        <div class="status-card">
          <div class="status-label">Mode</div>
          <div id="modeStatus" class="status-value">manual</div>
        </div>
      </aside>
    </main>
  </div>

  <script src="modules/ui/status.js"></script>
  <script src="modules/ui/renderer.js"></script>

  <script src="modules/speech/state.js"></script>
  <script src="modules/speech/input.js"></script>
  <script src="modules/speech/output.js"></script>

  <script src="modules/ai/request.js"></script>
  <script src="modules/ai/response.js"></script>

  <script src="modules/ui/bindings.js"></script>
</body>
</html>
