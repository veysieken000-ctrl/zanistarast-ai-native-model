<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Zanistarast Speech Interface</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#0b1320;
  color:#fff;
  padding:20px;
}

.container {
  max-width:900px;
  margin:auto;
}

h1 {
  font-size:32px;
  margin-bottom:10px;
}

.controls button {
  padding:12px 16px;
  margin:5px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

#startBtn { background:#4cc9f0; color:#000; }
#stopBtn { background:#444; }
#sendBtn { background:#7b61ff; }
#speakBtn { background:#00c2a8; }
#clearBtn { background:#ff4d6d; }

textarea {
  width:100%;
  height:150px;
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  border:none;
  font-size:16px;
}

.answer {
  margin-top:15px;
  padding:10px;
  background:#111c30;
  border-radius:10px;
  min-height:120px;
  white-space:pre-wrap;
}

.status {
  margin-top:10px;
  font-weight:bold;
}
</style>
</head>

<body>
<div class="container">

<h1>Speech Interface</h1>

<div class="controls">
  <button onclick="startListening()">🎙 Start</button>
  <button onclick="stopListening()">⏹ Stop</button>
  <button onclick="sendQuestion()">📤 Send</button>
  <button onclick="speakAnswer()">🔊 Speak</button>
  <button onclick="clearAll()">🧹 Clear</button>
</div>

<textarea id="questionInput" placeholder="Speak or type your question..."></textarea>

<div class="answer" id="answerOutput">No answer yet.</div>

<div class="status" id="status">Ready</div>

</div>

<script>
const API_URL = "https://zanistarast-ai-server.onrender.com/api/ask";

let recognition;
let isListening = false;

function setStatus(text){
  document.getElementById("status").innerText = text;
}

function startListening(){
  if(!('webkitSpeechRecognition' in window)){
    setStatus("Speech not supported");
    return;
  }

  recognition = new webkitSpeechRecognition();
  recognition.lang = "en-US";
  recognition.continuous = false;

  recognition.onstart = () => {
    isListening = true;
    setStatus("Listening...");
  };

  recognition.onresult = (e) => {
    const text = e.results[0][0].transcript;
    document.getElementById("questionInput").value = text;
  };

  recognition.onend = () => {
    isListening = false;
    setStatus("Stopped");
  };

  recognition.start();
}

function stopListening(){
  if(recognition && isListening){
    recognition.stop();
  }
}

async function sendQuestion(){
  const q = document.getElementById("questionInput").value.trim();
  if(!q){
    setStatus("Write something first");
    return;
  }

  setStatus("Sending...");
  document.getElementById("answerOutput").innerText = "...";

  try{
    const res = await fetch(API_URL,{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({ question:q })
    });

    const data = await res.json();

    document.getElementById("answerOutput").innerText = data.answer || "No answer";
    setStatus("Done");

  }catch(err){
    setStatus("Error");
    document.getElementById("answerOutput").innerText = err.message;
  }
}

function speakAnswer(){
  const text = document.getElementById("answerOutput").innerText;
  if(!text) return;

  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = "en-US";
  speechSynthesis.speak(utter);
}

function clearAll(){
  document.getElementById("questionInput").value="";
  document.getElementById("answerOutput").innerText="No answer yet.";
  setStatus("Cleared");
}
</script>

</body>
</html>
