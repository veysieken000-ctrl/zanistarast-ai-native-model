<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zanistarast AI & Speech</title>

<style>
body {
  margin:0;
  font-family: Inter, Arial;
  background:#0a0f1c;
  color:white;
}

/* PANEL */
.panel {
  max-width:900px;
  margin:60px auto;
  padding:30px;
  background:rgba(20,30,40,0.9);
  border-radius:20px;
}

/* LANGUAGE */
#languageSelect {
  font-size:18px;
  padding:12px 18px;
  border-radius:10px;
  background:#111;
  color:white;
  border:2px solid #4ea1ff;
  margin-bottom:20px;
}

/* INPUT */
textarea {
  width:100%;
  height:120px;
  border-radius:12px;
  padding:15px;
  background:#0b1324;
  color:white;
  border:1px solid #333;
}

/* BUTTONS */
.buttons {
  margin-top:15px;
}

button {
  padding:10px 16px;
  border:none;
  border-radius:10px;
  margin-right:10px;
  cursor:pointer;
}

.send {background:#ffd43b;}
.clear {background:#ffa94d;}
</style>
</head>

<body>

<div class="panel">

<h2>Zanistarast AI & Speech</h2>

<select id="languageSelect">
  <option value="tr">Türkçe</option>
  <option value="en">English</option>
</select>

<textarea id="input" placeholder="Bir şey yaz..."></textarea>

<div class="buttons">
  <button class="send" onclick="ask()">Gönder</button>
  <button class="clear" onclick="clearBox()">Temizle</button>
</div>

<div id="output" style="margin-top:20px;"></div>

</div>

<script>
function ask(){
  const q = document.getElementById("input").value;
  const out = document.getElementById("output");

  if(!q){
    out.innerHTML = "Boş soru";
    return;
  }

  if(q.toLowerCase().includes("hebun")){
    out.innerHTML = "<b>Hebûn</b>: varlığın ontolojik temelidir.";
  } else {
    out.innerHTML = "AI cevap üretti: " + q;
  }
}

function clearBox(){
  document.getElementById("input").value = "";
  document.getElementById("output").innerHTML = "";
}
</script>

</body>
</html>
