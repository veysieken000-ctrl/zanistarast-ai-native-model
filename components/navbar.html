<script>
  (function () {
    const menuBtn = document.getElementById("znMenuBtn");
    const menu = document.getElementById("znMenu");
    const dropdowns = document.querySelectorAll(".zn-dropdown");

    if (menuBtn && menu) {
      menuBtn.addEventListener("click", function () {
        menu.classList.toggle("active");
      });
    }

    dropdowns.forEach(function (dropdown) {
      const btn = dropdown.querySelector(".zn-drop-btn");

      if (btn) {
        btn.addEventListener("click", function (e) {
          e.preventDefault();
          dropdown.classList.toggle("open");
        });
      }
    });
  })();
</script>
