<script>

(function(){

  const menuBtn =
  document.getElementById("znMenuBtn");

  const menu =
  document.getElementById("znMenu");

  const dropdowns =
  document.querySelectorAll(".zn-dropdown");

  if(menuBtn && menu){

    menuBtn.addEventListener(
      "click",
      function(e){

        e.stopPropagation();

        menu.classList.toggle("active");
      }
    );
  }

  dropdowns.forEach(function(dropdown){

    const btn =
    dropdown.querySelector(".zn-drop-btn");

    btn.addEventListener(
      "click",
      function(e){

        e.preventDefault();

        e.stopPropagation();

        dropdowns.forEach(function(other){

          if(other !== dropdown){

            other.classList.remove("open");
          }
        });

        dropdown.classList.toggle("open");
      }
    );
  });

  document.addEventListener(
    "click",
    function(){

      dropdowns.forEach(function(dropdown){

        dropdown.classList.remove("open");
      });
    }
  );

  document
  .querySelectorAll(".zn-drop-content a")
  .forEach(function(link){

    link.addEventListener(
      "click",
      function(e){

        e.stopPropagation();
      }
    );
  });

})();

</script>
