<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>07 - Medeniyet Teorisi</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="navbar"></div>

<script>
fetch("components/navbar.html")
.then(function(res){
  return res.text();
})
.then(function(data){
  const navbar = document.getElementById("navbar");
  navbar.innerHTML = data;

  const scripts = navbar.querySelectorAll("script");

  scripts.forEach(function(oldScript){
    const newScript = document.createElement("script");

    if(oldScript.src){
      newScript.src = oldScript.src;
    } else {
      newScript.textContent = oldScript.textContent;
    }

    document.body.appendChild(newScript);
    oldScript.remove();
  });
});
</script>
  <main class="container">
    <a href="theory.html">← Back to Theory</a>

    <section class="hero">
      <div class="hero-card">
        <h1>07 - Medeniyet Teorisi</h1>
        <p>
          Medeniyet; ontoloji, epistemoloji, ekonomi, zihin, ahlak ve zaman katmanlarının
          dengeli birleşimiyle oluşan üst düzey yapısal uygarlık modelidir.
        </p>
      </div>
    </section>
    
  </main>
</body>
</html>
