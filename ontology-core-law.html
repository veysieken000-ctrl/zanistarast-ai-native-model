<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Core Law</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { background:#0b0f1a; color:#fff; font-family:Arial,sans-serif; padding:40px; }
    .back { margin-bottom:20px; display:inline-block; color:#8cb3ff; text-decoration:none; }
    .card { background:rgba(255,255,255,0.05); padding:20px; border-radius:12px; max-width:900px; }
    h1 { margin-bottom:10px; }
    p { line-height:1.7; color:rgba(255,255,255,0.85); }
  </style>
</head>
<body>
  <div id="navbar"></div>

<script>
fetch("components/navbar.html")
.then(function(res){
  return res.text();
})
.then(function(data){
  const navbar = document.getElementById("navbar");
  navbar.innerHTML = data;

  const scripts = navbar.querySelectorAll("script");

  scripts.forEach(function(oldScript){
    const newScript = document.createElement("script");

    if(oldScript.src){
      newScript.src = oldScript.src;
    } else {
      newScript.textContent = oldScript.textContent;
    }

    document.body.appendChild(newScript);
    oldScript.remove();
  });
});
</script>
  
  <a href="ontology.html" class="back">← Back to Ontology</a>
  <div class="card">
    <h1>Core Law</h1>
    <p>Ontology core law layer.</p>
  </div>
</body>
</html>
