<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Core Law</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="navbar"></div>

<script>
fetch("components/navbar.html")
.then(function(res){
  return res.text();
})
.then(function(data){
  const navbar = document.getElementById("navbar");
  navbar.innerHTML = data;

  const scripts = navbar.querySelectorAll("script");

  scripts.forEach(function(oldScript){
    const newScript = document.createElement("script");

    if(oldScript.src){
      newScript.src = oldScript.src;
    } else {
      newScript.textContent = oldScript.textContent;
    }

    document.body.appendChild(newScript);
    oldScript.remove();
  });
});
</script>
 
  <main class="container">
  
    <section class="hero-card article-meta-card">
<p><strong>Kategori:</strong> Ontoloji</p>
<p><strong>Etiketler:</strong> Varoluş, Bilgi, Doğrudanlık, Yükseliş, Kalıcılık</p>
<p><strong>Okuma Yolu:</strong> Var Olmak → Bilmek → Doğrudanlık → Yükselmek → Kalmak</p>
<p><strong>Durum:</strong> Aktif Makale</p>
</section>
    
    <a href="ontology.html" class="back">← Back to Ontology</a>
  <div class="card">
    <h1>Core Law</h1>
    <p>Ontology core law layer.</p>
  </div>
</body>
</html>
