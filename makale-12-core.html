<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Core</title>

  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <div id="navbar"></div>

<script>
fetch("components/navbar.html")
.then(function(res){
  return res.text();
})
.then(function(data){
  const navbar = document.getElementById("navbar");
  navbar.innerHTML = data;

  const scripts = navbar.querySelectorAll("script");

  scripts.forEach(function(oldScript){
    const newScript = document.createElement("script");

    if(oldScript.src){
      newScript.src = oldScript.src;
    } else {
      newScript.textContent = oldScript.textContent;
    }

    document.body.appendChild(newScript);
    oldScript.remove();
  });
});
</script>
  <a href="makaleler.html" class="back">← Back to Makaleler</a>

  <div class="card">
    <h1>12 - Core</h1>

    <p>Core, tüm sistemin merkezini ve temel prensiplerini temsil eder.</p>
    <p>Burada ontoloji, epistemoloji, ekonomi ve medeniyet tek bir yapı içinde birleşir.</p>
    <p>Bu merkez, sistemin tutarlılığını ve sürdürülebilirliğini sağlar.</p>
  </div>
</body>
</html>
