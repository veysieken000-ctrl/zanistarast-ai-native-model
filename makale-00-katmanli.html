<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Katmanlı Varlık Okuması</title>

  <link rel="stylesheet" href="css/style.css" />

</head>

<body>
  <div id="navbar"></div>

<script>
fetch("components/navbar.html")
.then(function(res){
  return res.text();
})
.then(function(data){
  const navbar = document.getElementById("navbar");
  navbar.innerHTML = data;

  const scripts = navbar.querySelectorAll("script");

  scripts.forEach(function(oldScript){
    const newScript = document.createElement("script");

    if(oldScript.src){
      newScript.src = oldScript.src;
    } else {
      newScript.textContent = oldScript.textContent;
    }

    document.body.appendChild(newScript);
    oldScript.remove();
  });
});
</script>
  <a href="makaleler.html" class="back">← Back to Makaleler</a>

  <div class="card">
    <h1>00 - Katmanlı Varlık Okuması</h1>

    <p>Varlık, tek katmanlı değil; fiziksel, biyolojik, zihinsel ve ahlaki düzeylerden oluşan katmanlı bir yapıdır.</p>
    <p>Her katman bir öncekine dayanır ve onu ihlal etmeden genişler.</p>
    <p>Bu yaklaşım, varlığı parçalı değil bütünsel olarak anlamayı sağlar.</p>
  </div>
</body>
</html>
