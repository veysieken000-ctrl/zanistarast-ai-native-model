<!DOCTYPE html>
<html>
<head>
  <title>Graph — Zanistarast</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .graph-wrapper {
      margin-top: 30px;
      overflow-x: auto;
      background: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 20px;
    }

    #graph-svg {
      width: 1150px;
      height: 520px;
    }

    #graph-details {
      margin-top: 30px;
      padding: 20px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      text-align: left;
    }
  </style>
</head>

<body>
<div style="margin-top:30px;">
  <h3>Query System</h3>
  <input id="query-input" placeholder="Ask a system question..." style="width:100%; padding:10px; margin-top:10px;">
  <button onclick="runQuery()" style="margin-top:10px;">Run Query</button>
  <div id="query-result" style="margin-top:15px;"></div>
</div>

 <div id="navbar"></div>

<script>
fetch("components/navbar.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("navbar").innerHTML = data;
  });
</script>

<div class="container">

  <h1>Interactive System Graph</h1>

  <p>
    Click any node to inspect its structural relations.
  </p>

  <div class="graph-wrapper">
    <svg id="graph-svg"></svg>
  </div>

  <div id="graph-details">
    <h3>Graph Inspector</h3>
    <p>Click a node to see incoming and outgoing relations.</p>
  </div>

</div>

<script src="graph.js"></script>
</body>
</html>
