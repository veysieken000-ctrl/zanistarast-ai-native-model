<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Graph — Zanistarast</title>
<link rel="stylesheet" href="style.css" />

<style>
.graph-page {
  padding-bottom: 80px;
}

.graph-hero {
  position: relative;
  overflow: hidden;
}

.cosmic-symbol {
  position: absolute;
  inset: 0;
  opacity: 0.28;
  pointer-events: none;
}

.flag-field {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 50% 40%, rgba(80,120,255,0.18), transparent 28%),
    linear-gradient(180deg, rgba(0,0,0,0.2), rgba(0,0,0,0.85));
}

.mini-earth {
  position: absolute;
  left: 50%;
  top: 34%;
  width: 46px;
  height: 46px;
  transform: translateX(-50%);
  border-radius: 50%;
  background:
    radial-gradient(circle at 30% 30%, #9bd3ff, #2266aa 42%, #123d66 72%, #071a2d);
  box-shadow: 0 0 22px rgba(120,190,255,0.8);
}

.white-pencil {
  position: absolute;
  left: calc(50% + 62px);
  top: 22%;
  width: 14px;
  height: 150px;
  background: linear-gradient(180deg, #fff, #dcecff);
  border-radius: 999px;
  transform: rotate(0deg);
  box-shadow: 0 0 18px rgba(255,255,255,0.75);
}

.white-pencil::after {
  content: "";
  position: absolute;
  left: 50%;
  bottom: -18px;
  transform: translateX(-50%);
  width: 0;
  height: 0;
  border-left: 9px solid transparent;
  border-right: 9px solid transparent;
  border-top: 22px solid #ffffff;
}

.light-flow {
  position: absolute;
  left: calc(50% + 62px);
  top: calc(22% + 165px);
  width: 6px;
  height: 210px;
  transform: translateX(4px);
  background: linear-gradient(180deg, rgba(255,255,255,0.9), rgba(120,190,255,0.08));
  filter: blur(1px);
  box-shadow: 0 0 28px rgba(255,255,255,0.9);
}

.system-flow {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 24px;
}

.system-flow span {
  padding: 10px 14px;
  border-radius: 999px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.14);
  font-size: 14px;
}

.graph-map {
  position: relative;
  margin-top: 28px;
  min-height: 720px;
  border-radius: 28px;
  background:
    radial-gradient(circle at center, rgba(80,130,255,0.18), transparent 28%),
    linear-gradient(180deg, rgba(255,255,255,0.07), rgba(255,255,255,0.03));
  border: 1px solid rgba(255,255,255,0.13);
  overflow: hidden;
}

.ring {
  position: absolute;
  left: 50%;
  top: 50%;
  border: 1px solid rgba(255,255,255,0.16);
  border-radius: 50%;
  transform: translate(-50%, -50%);
}

.ring-1 { width: 320px; height: 320px; }
.ring-2 { width: 520px; height: 520px; }
.ring-3 { width: 700px; height: 700px; }

.graph-node {
  position: absolute;
  transform: translate(-50%, -50%);
  padding: 14px 18px;
  border-radius: 18px;
  background: rgba(18,24,38,0.92);
  border: 1px solid rgba(255,255,255,0.14);
  color: white;
  font-weight: 800;
  cursor: pointer;
  box-shadow: 0 14px 30px rgba(0,0,0,0.3);
  transition: 0.25s ease;
}

.graph-node:hover,
.graph-node.active {
  background: linear-gradient(180deg, #4c8cff, #225eea);
  box-shadow: 0 0 26px rgba(100,160,255,0.9);
}

.center-node {
  left: 50%;
  top: 50%;
  font-size: 20px;
  padding: 20px 26px;
}

.detail-box {
  margin-top: 24px;
  padding: 26px;
  border-radius: 24px;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.13);
}

.detail-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-top: 18px;
}

.detail-actions a {
  padding: 10px 16px;
  border-radius: 999px;
  background: rgba(255,255,255,0.1);
  color: white;
  text-decoration: none;
}

.quick-links {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
  gap: 14px;
  margin-top: 24px;
}

.quick-links a {
  padding: 18px;
  border-radius: 18px;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.12);
  color: white;
  text-decoration: none;
  font-weight: 700;
}

@media (max-width: 850px) {
  .graph-map {
    min-height: 880px;
  }

  .ring-1, .ring-2, .ring-3 {
    display: none;
  }

  .graph-node {
    position: relative;
    left: auto !important;
    top: auto !important;
    transform: none;
    display: block;
    width: calc(100% - 40px);
    margin: 14px 20px;
    text-align: center;
  }

  .center-node {
    margin-top: 24px;
  }
}
</style>
</head>

<body>
<div id="navbar"></div>

<script>
fetch("components/navbar.html")
.then(res => res.text())
.then(data => {
  document.getElementById("navbar").innerHTML = data;
});
</script>

<main class="container graph-page">

<section class="hero graph-hero">
  <div class="cosmic-symbol">
    <div class="flag-field"></div>
    <div class="mini-earth"></div>
    <div class="white-pencil"></div>
    <div class="light-flow"></div>

  <div class="hero-card">
    <h1>Zanistarast Sistem Haritası</h1>
    <p>

      tek canlı sistem içinde gösterir.
    </p>

    <div class="system-flow">
      <span>Hebûn</span>
      <span>→ Zanabûn</span>
      <span>→ Rasterast</span>
      <span>→ Rabûn</span>
      <span>→ Mabûn</span>
      <span>→ Newroza Kawa</span>
    </div>
  </div>
</section>

<section class="graph-map">

  <div class="ring ring-1"></div>
  <div class="ring ring-2"></div>
  <div class="ring ring-3"></div>

  <button class="graph-node center-node active" style="left:50%;top:50%;" onclick="showDetail('zanistarast', this)">Zanistarast</button>

  <button class="graph-node" style="left:50%;top:27%;" onclick="showDetail('hebun', this)">Hebûn</button>
  <button class="graph-node" style="left:68%;top:39%;" onclick="showDetail('zanabun', this)">Zanabûn</button>

  <button class="graph-node" style="left:50%;top:10%;" onclick="showDetail('theory', this)">Theory</button>
  <button class="graph-node" style="left:82%;top:50%;" onclick="showDetail('theses', this)">Theses</button>
  <button class="graph-node" style="left:50%;top:90%;" onclick="showDetail('core', this)">Core</button>
  <button class="graph-node" style="left:18%;top:50%;" onclick="showDetail('reya', this)">Rêya fem û ferasetê</button>

  <button class="graph-node" style="left:50%;top:4%;" onclick="showDetail('newroza', this)">Newroza Kawa</button>
  <button class="graph-node" style="left:88%;top:22%;" onclick="showDetail('ai', this)">AI</button>
  <button class="graph-node" style="left:88%;top:78%;" onclick="showDetail('toplum', this)">Toplum</button>
  <button class="graph-node" style="left:12%;top:78%;" onclick="showDetail('ekonomi', this)">Ekonomi</button>
  <button class="graph-node" style="left:12%;top:22%;" onclick="showDetail('yonetim', this)">Yönetim</button>

</section>

<section id="detailBox" class="detail-box"></section>

<section class="quick-links">
  <a href="theory.html">Theory</a>
  <a href="rabun.html">Rabûn Yönetim Modeli</a>
  <a href="mabun.html">Mabûn Ekonomi Modeli</a>
  <a href="zanistarast-rasterast.html">Rasterast Doğrulama Filtresi</a>
</section>

</main>

function showDetail(key, el) {
  const item = graphData[key];
  const box = document.getElementById("detailBox");

  document.querySelectorAll(".graph-node").forEach(node => node.classList.remove("active"));
  if (el) el.classList.add("active");

  box.innerHTML = `
    <h2>${item.title}</h2>
    <p><strong>Tanım:</strong> ${item.tanim}</p>
    <p><strong>Rol:</strong> ${item.rol}</p>
    <p><strong>Fonksiyon:</strong> ${item.fonksiyon}</p>
    <p><strong>Formül:</strong> ${item.formul}</p>
    <p><strong>İlgili makaleler:</strong> ${item.related}</p>
    <div class="detail-actions">
      <a href="${item.page}">Sayfaya git</a>
      <a href="ai-speech.html?prompt=${encodeURIComponent(item.title)}">AI’ye sor</a>
    </div>
  `;
}

showDetail("zanistarast", document.querySelector(".center-node"));
</script>
