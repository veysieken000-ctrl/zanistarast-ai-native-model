    - "constitution/01-core-directive.md"
    - "constitution/02-human-priority-principle.md"
    - "constitution/03-bounded-intelligence.md"
    - "constitution/04-originative-reason.md"
    - "constitution/05-truth-integrity.md"
    - "constitution/06-anti-deception-protocol.md"
    - "constitution/07-beneficial-agent-protocol.md"
    - "constitution/08-civilizational-stability.md"
    - "constitution/09-rasterast-verification-duty.md"
    - "constitution/10-final-ai-oath.md"

  core:
    - "core/locked-constitutional-layer.md"
    - "core/immutable-truth-principle.md"
    - "core/rasterast-hallucination-filter.md"
    - "core/religious-integrity-layer.md"

  specs:
