<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="refresh" content="0; url=zanistarast-rasterast.html" />
  <title>Rasterast</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <p>Rasterast sayfasına yönlendiriliyorsunuz...</p>
  <a href="zanistarast-rasterast.html">Rasterast sayfasına git</a>
<script>
  fetch("components/navbar.html")
    .then(function (res) {
      return res.text();
    })
    .then(function (data) {
      const navbar = document.getElementById("navbar");
      navbar.innerHTML = data;

      const scripts = navbar.querySelectorAll("script");

      scripts.forEach(function (oldScript) {
        const newScript = document.createElement("script");

        if (oldScript.src) {
          newScript.src = oldScript.src;
        } else {
          newScript.textContent = oldScript.textContent;
        }

        document.body.appendChild(newScript);
        oldScript.remove();
      });
    });
</script>
</body>
</html>
