<!DOCTYPE html>
<html>
<head>
  <title>Zanistarast AI</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="navbar"></div>

<script>
fetch("components/navbar.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("navbar").innerHTML = data;
  });
</script>
  
<div class="container">

  <h1>Zanistarast AI</h1>

  <p>Ask questions about the system.</p>

  <input id="ai-input" placeholder="Ask something..." style="width:100%; padding:12px;">
  <button onclick="askAI()" style="margin-top:10px;">Ask</button>

  <div id="ai-output" style="margin-top:20px;"></div>

</div>

<script src="ai.js"></script>
</body>
</html>

<script src="ai.js"></script>
