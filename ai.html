<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zanistarast AI</title>
  <meta
    name="description"
    content="Interactive Zanistarast AI for ontology, epistemology, civilization, economics, fitrat, history, and structural analysis."
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="navbar"></div>

  <script>
    fetch("components/navbar.html")
      .then((res) => res.text())
      .then((data) => {
        document.getElementById("navbar").innerHTML = data;
      })
      .catch(() => {
        document.getElementById("navbar").innerHTML = "";
      });
  </script>

  <main class="ai-layout">
    <section class="section-card ai-card">
      <div class="ai-section-head">
        <h2>Hızlı Konular</h2>
        <p class="subtitle">
          Tek tıkla konu yerleştir. Sonra doğrudan sorabilir veya düzenleyebilirsin.
        </p>
      </div>

      <div class="topic-chip-wrap">
        <button type="button" class="topic-chip chip-main" onclick="fillPrompt('Hebûn nedir?')">Hebûn</button>
        <button type="button" class="topic-chip chip-main" onclick="fillPrompt('Zanabûn nedir?')">Zanabûn</button>
        <button type="button" class="topic-chip chip-main" onclick="fillPrompt('Mabûn nedir?')">Mabûn</button>
        <button type="button" class="topic-chip chip-main" onclick="fillPrompt('Rasterast nedir?')">Rasterast</button>
        <button type="button" class="topic-chip chip-main" onclick="fillPrompt('Rêbûn nedir?')">Rêbûn</button>
        <button type="button" class="topic-chip chip-main" onclick="fillPrompt('Newroza Kawa nedir?')">Newroza Kawa</button>

        <button type="button" class="topic-chip chip-paper" onclick="fillPrompt('Bilimsel sentez nedir?')">Bilimsel Sentez</button>
        <button type="button" class="topic-chip chip-paper" onclick="fillPrompt('Ontoloji nedir?')">Ontoloji</button>
        <button type="button" class="topic-chip chip-paper" onclick="fillPrompt('Epistemoloji nedir?')">Epistemoloji</button>
        <button type="button" class="topic-chip chip-paper" onclick="fillPrompt('Ekonomi modeli nedir?')">Ekonomi Modeli</button>

        <button type="button" class="topic-chip chip-history" onclick="fillPrompt('Varlık tarihi nedir?')">Varlık Tarihi</button>
        <button type="button" class="topic-chip chip-history" onclick="fillPrompt('İnsanlık tarihi nedir?')">İnsanlık Tarihi</button>
        <button type="button" class="topic-chip chip-history" onclick="fillPrompt('Jeoloji nedir?')">Jeoloji</button>
        <button type="button" class="topic-chip chip-history" onclick="fillPrompt('Zihin nedir?')">Zihnin</button>

        <button type="button" class="topic-chip chip-compare" onclick="fillPrompt('Modern bilim ile karşılaştır.')">Modern Bilim</button>
        <button type="button" class="topic-chip chip-compare" onclick="fillPrompt('Klasik ontoloji ile karşılaştır.')">Klasik Ontoloji</button>
        <button type="button" class="topic-chip chip-compare" onclick="fillPrompt('Felsefe ile karşılaştır.')">Felsefe</button>
        <button type="button" class="topic-chip chip-compare" onclick="fillPrompt('Semantik nedir?')">Semantik</button>
      </div>
    </section>

   <section class="section-card ai-card" style="display:block !important; visibility:visible !important; opacity:1 !important; margin-top:18px !important;">
  <div class="ai-section-head" style="display:block !important; visibility:visible !important; opacity:1 !important;">
    <h2>Çerçeveye Sor</h2>
    <p class="subtitle">Sorunu doğrudan yaz. Kısa veya uzun olabilir.</p>
  </div>

  <div class="ai-box" style="display:block !important; visibility:visible !important; opacity:1 !important;">
    <div class="ask-row" style="display:flex !important; gap:12px !important; align-items:center !important;">
      <input id="questionInput" type="text" placeholder="Sorunu yaz..." style="flex:1 !important; display:block !important;" />
      <button id="askBtn" type="button" style="display:inline-flex !important;">Sor</button>
    </div>

    <div id="thinkingBox" class="thinking hidden" style="margin-top:12px !important; display:none;">
      Düşünüyorum...
    </div>

    <div id="answerBox" class="answer-box" style="display:block !important; visibility:visible !important; opacity:1 !important; margin-top:12px !important; min-height:160px !important;">
      Cevap burada görünecek.
    </div>
  </div>
</section>
</section>
</main>

<footer style="position:static !important; display:block !important; margin-top:24px !important;">
  <div class="container">Zanistarast AI Interface</div>
</footer>
<script src="ai.js"></script>
</body>
</html>
