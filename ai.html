<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zanistarast Redirect</title>
  <meta http-equiv="refresh" content="0; url=speech.html" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .redirect-shell {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .redirect-card {
      width: 100%;
      max-width: 720px;
      border-radius: 24px;
      padding: 28px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.28);
      text-align: center;
    }

    .redirect-title {
      margin: 0 0 10px;
      font-size: 32px;
      line-height: 1.1;
      color: #ffffff;
    }

    .redirect-text {
      margin: 0;
      font-size: 16px;
      line-height: 1.7;
      color: rgba(255, 255, 255, 0.82);
    }
.redirect-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 20px;
      padding: 12px 18px;
      border-radius: 999px;
      text-decoration: none;
      color: #ffffff;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .redirect-link:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.14);
    }

    .redirect-note {
      margin-top: 14px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.56);
    }
  </style>
</head>
<body>
  <div id="navbar"></div>

  <script>
    fetch("components/navbar.html")
      .then((res) => res.text())
      .then((data) => {
        document.getElementById("navbar").innerHTML = data;
      })
      .catch(() => {
        document.getElementById("navbar").innerHTML = "";
      });
  </script>
  <main class="redirect-shell">
    <section class="redirect-card">
      <h1 class="redirect-title">Zanistarast AI moved</h1>
      <p class="redirect-text">
        This page is no longer used as a separate AI interface.
        The unified experience now lives in the AI &amp; Speech page.
      </p>

      <a class="redirect-link" href="speech.html">Open AI &amp; Speech</a>

      <div class="redirect-note">
        Redirecting automatically...
      </div>
    </section>
  </main>

  <script>
    window.location.replace("speech.html");
  </script>
